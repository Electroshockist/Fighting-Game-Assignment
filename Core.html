<title>Collision</title>

<link rel="stylesheet" type="text/css" href="CSS/Electroshockist.css">

<div id="overlay" onclick="overlayoff()" style="display: none;">
  <div id="overlay_text" style="margin-top: 5%;"></div>
</div>

<div class="overlay">
  <canvas width="1248" height="648"></canvas>

  <p id="instructions" class="centered" style="font-family: arial black; font-size: 18px;" onclick="instructions()">Use W, A, S and D to move.</p>

</div>

<script type="text/javascript" src="Javascript/Electroshockist.js"></script>
<script type="text/javascript" src="Characters.js"></script>

<script>
  //get the canvas object and store it
  var canvas = document.querySelector("canvas");
  //get the 2D rendering library
  var context = canvas.getContext("2d");

  //disables antialiasing
  context.imageSmoothingEnabled = false;

  //for pausing
  var pause =  false;

  //A variable to tell us which side the collision is occurring on
  var collisionSide = "";

  //scale of images
  var scale = 3;

  //set player stuffs
  var Player = Cammy;
  Player.X = 30;
  Player.Y = 250;

  //set enemy stuffs
  var Enemy = Cammy;

  Player.drawImage = new Image();
  Player.drawImage.src = Player.IMAGE;


  var BG = new Image();
  BG.src = "Assets/stage.png";

  Player.drawImage.addEventListener("load",update);

  //keydown listener
  window.addEventListener("keydown", function (event) {
    //doesn't run unless w a s or d are pressed
    if( event.keyCode == 87 ||
        event.keyCode == 65 ||
        event.keyCode == 83 ||
        event.keyCode == 68 ||
        event.keyCode == 70 ) {

          switch (event.keyCode) {

            //detects "w"
            case 87:
              Player.jump();
            break;

            //detects "a"
            case 65:
              Player.moveleft = true;
            break;

            //detects "s"
            case 83:
            break;

            //detects "d"
            case 68:
              Player.moveright = true;
            break;

            default:
            alert("Something went wrong getting your key.")
          }
    }
    else console.log("Invalid key.");
  }, false);

  //keyup listener
  window.addEventListener("keyup",function(event) {
    switch (event.keyCode) {

      //detects "w"
      case 87:
          // Player.jump();
        break;

        //detects "a"
        case 65:
          Player.moveleft = false;
        break;

        //detects "s"
        case 83:
        break;

        //detects "d"
        case 68:
          Player.moveright = false;
        break;
      }
  }, false);

  //and movement
  function WallCollision(entity){

    if (entity.left() <= 2) {
      entity.canMoveLeft = false;
      entity.moveleft = false;
      entity.X = 2;
    }
    else entity.canMoveLeft = true;

    if(Player.right() >= canvas.width-2) {
      entity.canMoveRight = false;
      entity.moveright = false;
    }
    else entity.canMoveRight = true;

    //movement
    //moveleft
    if(entity.moveleft && entity.canMoveLeft) Player.VX = -5;
    //moveright
    if(entity.moveright && entity.canMoveRight) Player.VX = 5;

    //Set the Player's velocity to zero if none of the keys are being pressed
    if(!entity.moveleft && !entity.moveright) Player.VX = 0;
    interval = new Date() / 1000;
  }

  function render() {
    context.fillRect (0, 0, canvas.width, canvas.height);
    //Clear the previous animation frame
    context.clearRect(1, 1, canvas.width-2, canvas.height-2);
    //drwas background
    context.drawImage(BG, 0, 0, 416, 216, 0, 0, 416 * scale, 216 * scale);
    //draws Player
    context.drawImage(Player.drawImage, 0, 0, Player.W, Player.H, Player.X, Player.Y, Player.W*scale, Player.H*scale);
  }

  function update(){
    requestAnimationFrame(update,canvas);
    WallCollision(Player);
    //WallCollision(Enemy);

    //Move the Player
    Player.X += Player.VX;

    //Render the sprite object
    render();
  }
</script>

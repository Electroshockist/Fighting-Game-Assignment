<title>Street Fighter 2: The new challengers</title>

<link rel="stylesheet" type="text/css" href="CSS/Electroshockist.css">

<div id="overlay" onclick="overlayoff()" style="display: none;">
  <div id="overlay_text" style="margin-top: 5%;"></div>
</div>

<div class="overlay">
  <canvas width="1248" height="648"></canvas>

  <p id="instructions" class="centered" style="font-family: arial black; font-size: 18px;" onclick="instructions()">Use W, A, S and D to move.</p>

</div>

<script type="text/javascript" src="Javascript/Electroshockist.js"></script>
<script type="text/javascript" src="Characters.js"></script>
<script type="text/javascript" src="Menu.js"></script>

<script>
  //get the canvas object and store it
  var canvas = document.querySelector("canvas");
  //get the 2D rendering library
  var context = canvas.getContext("2d");

  //disables antialiasing
  context.imageSmoothingEnabled = false;

  //time between frames
  var frametime = 150;

  //for pausing
  var pause =  false;

  //A variable to tell us which side the collision is occurring on
  var collisionSide = "";

  //scale of images
  var scale = 3;

  //set player stuffs
  var Player;
  var PlayerFlip;

  //set enemy stuffs
  var Enemy = new Ryu().object;
  var EnemyFlip;

  //keydown listener
  window.addEventListener("keydown", function (event) {

      if (inMenu){
          switch (event.keyCode) {

          //detects "a"
          case 65:
          X-=63;
          choice -= 1;
          if(choice<=-1){
            choice = 3;
            X+=63*4;
          }
          break;

          //detects "d"
          case 68:
          X+=63;
          choice += 1;
          if(choice>=4){
            choice = 0;
            X-=63*4;
          }
          break;

          case 32:
            inMenu = false;
            if (choice == 0) Player = new Ryu().object;
            if (choice == 1) Player = new Ken().object;
            if (choice == 2) Player = new ChunLi().object;
            if (choice == 3) Player = new Cammy().object;

            Player.X = 30;
            Enemy.X = 500;

            Player.drawImage = new Image();
            Player.drawImage.src = Player.IMAGE;

            Player.currentAnim = Player.idle;

            Enemy.drawImage = new Image();
            Enemy.drawImage.src = Enemy.IMAGE;

            Enemy.currentAnim = Enemy.idle;
          break;

          default:
          console.log(event.keyCode + " is not valid");
        }
      }

      else {
        switch (event.keyCode) {
          //detects "w"
          case 87:
            break;

          //detects "a"
          case 65:
            Player.moveleft = true;
            Player.moveright = false;
            break;

          //detects "s"
          case 83:
            Player.crouch.value = true;
            break;

          //detects "d"
          case 68:
            Player.moveright = true;
            Player.moveleft = false;
            break;

          case  32:
            Player.jump.value = true;
            break;

          case  16:
            Player.kick.value = true;
            break;

          case  17:
            Player.punch.value = true;
            break;

          default:
          console.log("Invalid key.");
        }
      }
  }, false);

  //keyup listener
  window.addEventListener("keyup",function(event) {
    if(!inMenu) {
        switch (event.keyCode) {

          //detects "w"
          case 87:
            break;

            //detects "a"
            case 65:
              Player.moveleft = false;
              break;

            //detects "s"
            case 83:
              Player.crouch.value = false;
              break;

            //detects "d"
            case 68:
              Player.moveright = false;
              break;

            case  32:
              Player.jump.value = false;
              break;

            case  16:
              Player.kick.value = false;
              break;

            case  17:
              Player.punch.value = false;
              break;
        }
    }
  }, false);

  function stopAnimatingPlayer(){
    Player.currentAnim.animating = false;
  }

  function stopAnimatingEnemy(){
    Enemy.currentAnim.animating = false;
  }

  //and movement
  function WallCollision(entity){
    //collides into left wall
    if (entity.left() <= 2) {
      entity.canMoveLeft = false;
      entity.moveleft = false;
      entity.X = 2;
    }
    else entity.canMoveLeft = true;

    if(entity.right() >= canvas.width-2) {
      entity.canMoveRight = false;
      entity.moveright = false;
    }
    else entity.canMoveRight = true;

    //movement
    //moveleft
    if(entity.moveleft && entity.canMoveLeft) entity.VX = -5;
    //moveright
    if(entity.moveright && entity.canMoveRight) entity.VX = 5;

    //Set the Player's velocity to zero if none of the keys are being pressed
    if(!entity.moveleft && !entity.moveright) entity.VX = 0;

    if (entity.VX != 0) entity.move.value = true;
    else entity.move.value = false;
  }

  var BG = new Image();
  BG.src = "Assets/stage.png";

  BG.addEventListener("load",update);

  function render() {

    context.fillRect (0, 0, canvas.width, canvas.height);
    //Clear the previous animation frame
    context.clearRect(1, 1, canvas.width-2, canvas.height-2);
    //drwas background
    context.drawImage(BG, 0, 0, 416, 216, 0, 0, 416 * scale, 216 * scale);
    //draws Enemy
    context.drawImage(Enemy.drawImage, Enemy.currentAnim.xOffset, Enemy.currentAnim.yOffset, Enemy.W, Enemy.H, Enemy.X, Enemy.Y, Enemy.W*scale, Enemy.H*scale);
    //draws Player
    context.drawImage(Player.drawImage, Player.currentAnim.xOffset, Player.currentAnim.yOffset, Player.W, Player.H, Player.X, Player.Y, Player.W*scale, Player.H*scale);
  }

  function update(){


    if (inMenu){
      updateMenu();
    }
    else {
      requestAnimationFrame(update,canvas);
      WallCollision(Player);
      WallCollision(Enemy);

      //Move the Player
      Player.X += Player.VX;
      Enemy.X += Enemy.VX;

      //determines facing direction
      if (Player.X < Enemy.X) {
        Player.currentAnim.flip = false;
        Enemy.currentAnim.flip = true;
      }
      else {
        Player.currentAnim.flip = true;
        Enemy.currentAnim.flip = false;
      }

      Player.setAnimations();
      Enemy.setAnimations();


      if (!Player.currentAnim.animating){
        Player.currentAnim.animating = true;
        Player.currentAnim.updateAnimation()
        setTimeout(stopAnimatingPlayer, frametime);
      }

      if (!Enemy.currentAnim.animating){
        Enemy.currentAnim.animating = true;
        Enemy.currentAnim.updateAnimation()
        setTimeout(stopAnimatingEnemy, frametime);
      }

      //Render the sprite object
      render();
    }
  }

</script>

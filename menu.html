<title>Collision</title>

<link rel="stylesheet" type="text/css" href="CSS/Electroshockist.css">

<div id="overlay" onclick="overlayoff()" style="display: none;">
  <div id="overlay_text" style="margin-top: 5%;"></div>
</div>

<div class="overlay">
  <canvas width="1248" height="648"></canvas>

  <p id="instructions" class="centered" style="font-family: arial black; font-size: 18px;" onclick="instructions()">Use W, A, S and D to move.</p>

</div>

<script type="text/javascript" src="Javascript/Electroshockist.js"></script>
<script type="text/javascript" src="Characters.js"></script>

<script>
  //get the canvas object and store it
  var canvas = document.querySelector("canvas");
  //get the 2D rendering library
  var context = canvas.getContext("2d");

  //disables antialiasing
  context.imageSmoothingEnabled = false;

  //for pausing
  var pause =  false;

  //scale of images
  var scale = 3;

  X = 0;
  Y = 0;
  choice = 0;

  //set enemy stuff
  
  var cursor = new Image();
  cursor.src = "Assets/cursor.png";
  
  var select = new Image();
  select.src = "Assets/character_select.png";
  
  var logo = new Image();
  logo.src = "Assets/logo.png";
  
  var portrait = new Image();
  portrait.src = "Assets/Portraits/ryuFace.png";

  logo.addEventListener("load",update);

  //keydown listener
  window.addEventListener("keydown", function (event) {
    //doesn't run unless w a s or d are pressed
    if(
        event.keyCode == 65 ||
        event.keyCode == 68  ) {

          switch (event.keyCode) {

            //detects "a"
            case 65:
            X-=63;
			choice -= 1;
			if(choice<=-1){
			choice = 3;
			X+=63*4;
			  }
            break;

            //detects "d"
            case 68:
			X+=63;
			choice += 1;
			if(choice>=4){
			choice = 0;
			X-=63*4;
			  }
            break;

            default:
            alert("Something went wrong getting your key.")
          }
    }
    else console.log("Invalid key.");
  }, false);

  function render() {
    context.fillRect (0, 0, canvas.width, canvas.height);
    //Clear the previous animation frame
    context.clearRect(1, 1, canvas.width-2, canvas.height-2);
    //drwas background
    context.drawImage(logo, 0, 0, 224, 148, 1, 100, 224 * scale, 148 * scale);
    //draws Player
	context.drawImage(select, 0, 0, 84, 32, 850, 450, 84*scale, 32*scale);
    context.drawImage(cursor, 0, 0, 21, 32, 850+X, 450+Y, 21*scale, 32*scale);
	context.drawImage(portrait, 0, 0, 54, 93, 900, 150, 54*scale, 93*scale);
  }

  function update(){
    requestAnimationFrame(update,canvas);
	if(choice == 0){  portrait.src = "Assets/Portraits/ryuface.png";}
	if(choice == 1){  portrait.src = "Assets/Portraits/kenface.png";}
	if(choice == 2){  portrait.src = "Assets/Portraits/chunliface.png";}
	if(choice == 3){  portrait.src = "Assets/Portraits/cammyface.png";}
    render();
  }
</script>
